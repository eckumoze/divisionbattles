<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Страница не найдена | DB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Russo+One&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.7.2/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <style>
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 20px; }
    .error-code { font-size: clamp(80px,20vw,160px); font-family: 'Russo One', sans-serif; font-weight: 400; line-height: 1; background: linear-gradient(135deg,#f59e0b,#d97706,#fbbf24); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .error-title { font-size: clamp(20px,4vw,32px); font-family: 'Russo One', sans-serif; font-weight: 400; margin: 10px 0 8px; color: var(--text-primary); }
    .error-desc { color: var(--text-muted); margin-bottom: 28px; font-size: 15px; transition: color 0.4s; }
  </style>
</head>
<body>
  <div>
    <div class="error-code">404</div>
    <div class="error-title">Страница не найдена</div>
    <p class="error-desc">Этой страницы не существует или она была перемещена.</p>
    <a href="index.html" class="btn btn-primary"><i class="fa-solid fa-arrow-left"></i> На главную</a>
  </div>
</body>
</html>
